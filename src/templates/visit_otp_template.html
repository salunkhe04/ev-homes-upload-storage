<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Visit</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        color: #333;
      }
      .container {
        width: 100%;
        max-width: 600px;
        margin: 20px auto;
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .header {
        background-color: #ff9800; /* Orange theme */
        padding: 20px;
        text-align: center;
        color: #ffffff;
      }
      .header h1 {
        margin: 0;
        font-size: 24px;
      }
      .content {
        padding: 20px;
        text-align: center;
      }
      .content p {
        font-size: 16px;
        margin-bottom: 20px;
      }
      .otp {
        font-size: 24px;
        font-weight: bold;
        padding: 10px 20px;
        border-radius: 4px;
        background-color: #f1f1f1;
        display: inline-block;
        margin: 20px 0;
      }
      .button {
        background-color: #ff9800; /* Orange theme */
        color: #ffffff;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 4px;
        font-size: 16px;
        display: inline-block;
      }
      .footer {
        padding: 20px;
        background-color: #f1f1f1;
        text-align: center;
        font-size: 12px;
        color: #666;
      }
      .footer a {
        color: #ff9800; /* Orange theme */
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Site Visit Request</h1>
      </div>
      <div class="content">
        <p>Dear ${name},</p>
        <p>
          We received a request to verify your visit. Use the following code to
          proceed:
        </p>
        <div class="otp">${otp}</div>
        <p>
          If you did not request this, please ignore this email or contact
          support.
        </p>
      </div>
      <div class="footer">
        <p>&copy; 2025 EV Homes Construction PVT LTD. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
