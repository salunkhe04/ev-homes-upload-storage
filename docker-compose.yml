version: "3.9"

services:
  api:
    build: .
    image: ev_home-backend:1.0
    restart: unless-stopped

    # Remove host network for scaling
    # network_mode: host

    ports:
      - "8082:8082" # Only needed for testing or direct access; Nginx can proxy

    env_file:
      - .env

    volumes:
      - /var/www/storage:/app/storage

    deploy:
      replicas: 3 # 🔹 scale 3 containers
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    driver: bridge
