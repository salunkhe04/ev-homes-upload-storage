services:
  ev-homes-backend-1:
    build: .
    container_name: ev_homes_backend_1
    restart: unless-stopped
    network_mode: host

    env_file:
      - .env

    environment:
      PORT: 8082
      TZ: Asia/Kolkata
      NODE_OPTIONS: "--max-old-space-size=2500"

    mem_limit: 4024m
    cpus: "1.5"

    volumes:
      - /var/www/storage:/app/storage

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 60s
      timeout: 10s
      retries: 3

